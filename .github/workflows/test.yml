# GitHub Actions workflow for testing gone-httpsession-redis
name: Test

# Trigger the workflow on push and pull request events
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

# Define workflow permissions
permissions:
  contents: read

jobs:
  # Job for testing across multiple Go versions
  test:
    name: Test
    runs-on: ubuntu-latest
    
    # Test strategy with multiple Go versions
    strategy:
      matrix:
        go-version: ['1.21', '1.22', '1.23', '1.24']
    
    steps:
    # Checkout the repository code
    - name: Checkout code
      uses: actions/checkout@v4
    
    # Set up Go environment
    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache: true
    
    # Download dependencies
    - name: Download dependencies
      run: go mod download
    
    # Verify dependencies
    - name: Verify dependencies
      run: go mod verify
    
    # Build the project
    - name: Build
      run: go build -v ./...
    
    # Run tests with race detection
    - name: Run tests
      run: go test -v -race ./...
    
    # Run benchmarks
    - name: Run benchmarks
      run: go test -v -bench=. -benchmem ./...
