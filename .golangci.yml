# Configuration for golangci-lint
# Documentation: https://golangci-lint.run/usage/configuration/

run:
  # Timeout for analysis
  timeout: 5m
  
  # Exit code when at least one issue was found
  issues-exit-code: 1
  
  # Include test files in analysis
  tests: true
  
  # Skip directories
  skip-dirs:
    - vendor
    - .git
  
  # Skip files
  skip-files:
    - ".*\\.pb\\.go$"
    - ".*_generated\\.go$"

# Output configuration
output:
  # Format of output: colored-line-number|line-number|json|tab|checkstyle|code-climate|junit-xml|github-actions
  format: github-actions
  
  # Print lines of code with issue
  print-issued-lines: true
  
  # Print linter name in the end of issue text
  print-linter-name: true
  
  # Make issues output unique by line
  uniq-by-line: true
  
  # Sort results by: filepath, line and column
  sort-results: true

# Linters configuration
linters:
  # Enable specific linters
  enable:
    - errcheck      # Check for unchecked errors
    - gosimple      # Simplify code
    - govet         # Vet examines Go source code
    - ineffassign   # Detect ineffectual assignments
    - staticcheck   # Go static analysis
    - typecheck     # Type checking
    - unused        # Check for unused constants, variables, functions and types
    - misspell      # Find commonly misspelled English words
    - gofmt         # Check whether code was gofmt-ed
    - goimports     # Check whether code was goimports-ed
    - gocritic      # Go critic linter
    - revive        # Fast, configurable, extensible, flexible, and beautiful linter for Go
    - gosec         # Security-focused linter
    - bodyclose     # Check whether HTTP response body is closed successfully
    - nilerr        # Find the code that returns nil even if it checks that the error is not nil
    - exportloopref # Check for pointers to enclosing loop variables
    - goconst       # Find repeated strings that could be replaced by a constant
    - unconvert     # Remove unnecessary type conversions
    - unparam       # Report unused function parameters
    - nakedret      # Find naked returns in functions greater than a specified function length
    - prealloc      # Find slice declarations that could potentially be pre-allocated
    - gomodguard    # Allow and block list linter for direct Go module dependencies
    
  # Disable specific linters
  disable:
    - deadcode      # Deprecated, replaced by unused
    - varcheck      # Deprecated, replaced by unused
    - structcheck   # Deprecated, replaced by unused
    - scopelint     # Deprecated, replaced by exportloopref

# Linters settings
linters-settings:
  # Settings for errcheck
  errcheck:
    # Report about not checking of errors in type assertions: `a := b.(MyStruct)`;
    check-type-assertions: true
    # Report about assignment of errors to blank identifier: `num, _ := strconv.Atoi(numStr)`;
    check-blank: true
    # Exclude functions list
    exclude-functions:
      - io/ioutil.ReadFile
      - io.Copy(*bytes.Buffer)
      - io.Copy(os.Stdout)

  # Settings for govet
  govet:
    # Report about shadowed variables
    check-shadowing: true
    # Enable all analyzers
    enable-all: true
    # Disable specific analyzers
    disable:
      - fieldalignment  # Too strict for this project

  # Settings for goimports
  goimports:
    # Put imports beginning with prefix after 3rd-party packages
    local-prefixes: github.com/yetiz-org/gone-httpsession-redis

  # Settings for gocritic
  gocritic:
    # Enable multiple checks by tags
    enabled-tags:
      - diagnostic
      - style
      - performance
      - experimental
    # Disable specific checks
    disabled-checks:
      - whyNoLint
      - unnamedResult

  # Settings for revive
  revive:
    # Minimal confidence for issues
    confidence: 0.8
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id

  # Settings for gosec
  gosec:
    # Include rules IDs in output
    includes:
      - G101 # Look for hard coded credentials
      - G102 # Bind to all interfaces
      - G103 # Audit the use of unsafe block
      - G104 # Audit errors not checked
      - G106 # Audit the use of ssh.InsecureIgnoreHostKey
      - G107 # Url provided to HTTP request as taint input
      - G108 # Profiling endpoint automatically exposed on /debug/pprof
      - G109 # Potential Integer overflow made by strconv.Atoi result conversion to int16/32
      - G110 # Potential DoS vulnerability via decompression bomb
      - G201 # SQL query construction using format string
      - G202 # SQL query construction using string concatenation
      - G203 # Use of unescaped data in HTML templates
      - G204 # Audit use of command execution
      - G301 # Poor file permissions used when creating a directory
      - G302 # Poor file permissions used with chmod
      - G303 # Creating tempfile using a predictable path
      - G304 # File path provided as taint input
      - G305 # File traversal when extracting zip/tar archive
      - G306 # Poor file permissions used when writing to a new file
      - G307 # Deferring a method which returns an error
      - G401 # Detect the usage of DES, RC4, MD5 or SHA1
      - G402 # Look for bad TLS connection settings
      - G403 # Ensure minimum RSA key length of 2048 bits
      - G404 # Insecure random number source (rand)
      - G501 # Import blocklist: crypto/md5
      - G502 # Import blocklist: crypto/des
      - G503 # Import blocklist: crypto/rc4
      - G504 # Import blocklist: net/http/cgi
      - G505 # Import blocklist: crypto/sha1
    # Exclude rules IDs (empty means include all)
    excludes: []
    # Confidence level: low, medium, high (default: low)
    confidence: medium
    # Severity level: low, medium, high (default: low) 
    severity: medium

# Issues configuration
issues:
  # List of regexps of issue texts to exclude
  exclude:
    # Exclude some linters from running on tests files
    - "G404: Use of weak random number generator"  # Allow weak random in tests
    - "G101: Potential hardcoded credentials"      # Allow test credentials
  
  # Exclude rules by text
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gosec
        - errcheck
        - gocritic
    
    # Exclude known linter issues
    - linters:
        - govet
      text: "shadow: declaration of \"err\" shadows declaration"
    
    # Exclude some staticcheck messages
    - linters:
        - staticcheck
      text: "SA9003:"
    
    # Exclude lll issues for long lines in tests and comments
    - linters:
        - lll
      source: "^//.*$"
  
  # Independently from option `exclude` we use default exclude patterns
  exclude-use-default: false
  
  # If set to true exclude and exclude-rules regular expressions become case sensitive
  exclude-case-sensitive: false
  
  # The list of ids of default excludes to include or disable
  include:
    - EXC0002 # disable excluding of issues about comments from golint
    - EXC0003 # disable excluding of issues about comments from revive
    - EXC0004 # disable excluding of issues about comments from gocritic
    - EXC0005 # disable excluding of issues about comments from staticcheck
    - EXC0006 # disable excluding of issues about comments from gosec
    - EXC0007 # disable excluding of issues about comments from gosimple
    - EXC0008 # disable excluding of issues about comments from govet
    - EXC0009 # disable excluding of issues about comments from typecheck
    - EXC0010 # disable excluding of issues about comments from errcheck
    - EXC0011 # disable excluding of issues about comments from goconst
    - EXC0012 # disable excluding of issues about comments from gocritic
    - EXC0013 # disable excluding of issues about comments from revive
    - EXC0014 # disable excluding of issues about comments from gosec
    - EXC0015 # disable excluding of issues about comments from gosimple

  # Maximum issues count per one linter
  max-issues-per-linter: 0
  
  # Maximum count of issues with the same text
  max-same-issues: 0
  
  # Show only new issues: if there are unstaged changes or untracked files,
  # only those changes are analyzed, else only changes in HEAD~ are analyzed
  new: false
  
  # Show only new issues created after git revision `REV`
  new-from-rev: ""
  
  # Show only new issues created in git patch with set file path
  new-from-patch: ""

  # Fix found issues (if it's supported by the linter)
  fix: false
